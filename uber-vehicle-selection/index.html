<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uber Vehicle Selection Mockup</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Load Inter font to simulate Uber Move if missing -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-primary: "Uber Move", "Inter", system-ui, sans-serif;
    }
  </style>
</head>
<body>

  <div class="device-frame">
    
    <!-- Map Section -->
    <div class="map-container">
      
      <!-- Status Bar -->
      <div class="status-bar">
        <div class="time">9:41</div>
        <div class="icons">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12.5 2H14.5V10H12.5V2Z" fill="black"/>
            <path d="M9.5 4H11.5V10H9.5V4Z" fill="black"/>
            <path d="M6.5 6H8.5V10H6.5V6Z" fill="black"/>
            <path d="M3.5 8H5.5V10H3.5V8Z" fill="black"/>
          </svg>
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M9 11C12.3137 11 15.3137 9.65685 17.4853 7.48528L16.0711 6.07107C14.2882 7.8539 11.7882 9 9 9C6.21178 9 3.71178 7.8539 1.92893 6.07107L0.514719 7.48528C2.68629 9.65685 5.68629 11 9 11Z" fill="black"/>
          </svg>
          <svg width="24" height="12" viewBox="0 0 24 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="2" width="20" height="8" rx="2" stroke="black" stroke-width="1.5"/>
            <rect x="2" y="3" width="14" height="6" rx="1" fill="black"/>
            <path d="M22 4.5V7.5" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <!-- Back Button -->
      <div class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </div>

      <!-- Tooltip -->
      <div class="map-tooltip">
        <div class="time">
          9
          <span>MIN</span>
        </div>
        <div class="address">
          Main Rd, Aryarup Complex
        </div>
      </div>

      <!-- Target Button -->
      <div class="target-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="3"></circle>
          <line x1="12" y1="2" x2="12" y2="4"></line>
          <line x1="12" y1="20" x2="12" y2="22"></line>
          <line x1="2" y1="12" x2="4" y2="12"></line>
          <line x1="20" y1="12" x2="22" y2="12"></line>
        </svg>
      </div>
      
    </div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet">
      
      <div class="tabs-container">
        <div class="tabs-header">
          <div class="tab">Popular</div>
          <div class="tab active">Economy</div>
          <div class="tab">Premium</div>
        </div>
        <div class="tab-subtitle">Affordable, compact rides</div>
      </div>

      <div class="ride-list">
        
        <!-- Pool Option (Selected) -->
        <div class="ride-item selected">
          <div class="ride-icon">
             <svg width="48" height="32" viewBox="0 0 24 24" fill="currentColor" style="color: #333;">
              <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
            </svg>
          </div>
          <div class="ride-info">
            <div class="ride-name">Pool</div>
            <div class="ride-time">11:05-11:32 am</div>
          </div>
          <div class="ride-price-container">
            <div class="ride-price">₹ 84.00</div>
            <div class="ride-capacity">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
              2
            </div>
          </div>
        </div>

        <!-- UberGo Option -->
        <div class="ride-item">
          <div class="ride-icon">
            <svg width="48" height="32" viewBox="0 0 24 24" fill="currentColor" style="color: #333;">
              <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
            </svg>
          </div>
          <div class="ride-info">
            <div class="ride-name">UberGo</div>
            <div class="ride-time">10:30-10:39 am</div>
          </div>
          <div class="ride-price-container">
            <div class="ride-price">₹ 167.04</div>
            <div class="ride-capacity">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
              4
            </div>
          </div>
        </div>

        <!-- UberXL Option -->
        <div class="ride-item">
          <div class="ride-icon">
            <svg width="48" height="32" viewBox="0 0 24 24" fill="currentColor" style="color: #333;">
              <path d="M19 5H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 9c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/>
              <!-- A simple SUV-like path would be better, but this is a placeholder -->
            </svg>
          </div>
          <div class="ride-info">
            <div class="ride-name">UberXL</div>
            <div class="ride-time">10:40-11:17 am</div>
          </div>
          <div class="ride-price-container">
            <div class="ride-price">₹ 286.00</div>
            <div class="ride-capacity">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
              6
            </div>
          </div>
        </div>

      </div>

      <div class="confirm-section">
        <button class="btn-confirm">CONFIRM POOL</button>
      </div>
      
      <div class="home-indicator"></div>

    </div>
  </div>

</body>
</html>
